<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATED CHAT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        #gate, #chat-box { border: 2px solid #00ff41; padding: 20px; width: 95%; max-width: 400px; background: #000; box-shadow: 0 0 15px #00ff41; }
        input { width: 100%; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; margin-bottom: 10px; outline: none; font-size: 16px; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #008f11; }
        #messages { height: 350px; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid #111; padding-right: 5px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .msg b { color: #fff; text-transform: lowercase; margin-right: 5px; }
        h2 { text-align: center; margin-top: 0; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="gate">
        <h2>ACCESS_DENIED</h2>
        <p style="font-size: 0.7rem; text-align: center;">V. 2.0.4 - ENCRYPTED CHANNEL</p>
        <input type="password" id="passInput" placeholder="ENTER KEY (Try 1234)">
        <input type="text" id="userInput" placeholder="YOUR_HANDLE">
        <button onclick="unlock()">INITIALIZE</button>
    </div>

    <div id="chat-box" class="hidden">
        <div id="messages"></div>
        <div style="display:flex; gap: 8px;">
            <input type="text" id="msgInput" placeholder="Type message..." style="margin:0">
            <button onclick="send()" style="width: 80px;">SEND</button>
        </div>
    </div>

    <script>
        // CONFIG - HARDCODED AS REQUESTED
        const SUPABASE_URL = 'https://vdqlvdphlifjhwegvrhv.supabase.co';
        // Note: You still need your specific Anon Key from Supabase settings for this to actually talk to your DB!
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcWx2ZHBobGlmamh3ZWd2cmh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTUwNzY0NDcsImV4cCI6MjAzMDY1MjQ0N30.YOUR_ACTUAL_KEY_HERE'; 
        const ACCESS_PASSWORD = '1234'; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let username = "Ghost";

        async function unlock() {
            const pass = document.getElementById('passInput').value;
            username = document.getElementById('userInput').value || "Guest";
            
            if (pass === ACCESS_PASSWORD) {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('chat-box').classList.remove('hidden');
                loadMessages();
                listenForMessages();
            } else {
                alert("ERR: INVALID_KEY");
            }
        }

        async function loadMessages() {
            const { data, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);
            
            if (data) {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                data.forEach(m => addMessageToUI(m));
            }
        }

        function addMessageToUI(m) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${m.username || 'anon'}:</b> ${m.content}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if (!content) return;
            
            input.value = '';
            const { error } = await supabaseClient
                .from('messages')
                .insert([{ content, username }]);
            
            if (error) console.error(error);
        }

        function listenForMessages() {
            supabaseClient
                .channel('schema-db-changes')
                .on('postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'messages' }, 
                    payload => addMessageToUI(payload.new)
                )
                .subscribe();
        }

        // Allow 'Enter' key to send
        document.getElementById('msgInput').addEventListener("keyup", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
